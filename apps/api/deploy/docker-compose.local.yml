services:
  postgres:
    image: postgres:16
    container_name: zangaka-mori-postgres
    environment:
      POSTGRES_DB: zangaka_mori
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - zangaka-mori-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zangaka_mori"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zangaka-mori-postgres-data:
